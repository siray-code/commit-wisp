name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Match tag and package versions
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a semantic version such as v1.2.3." >&2
            exit 1
          fi
          package_version="$(sed -n '/^\[package\]/,/^\[/ s/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ "v$package_version" != "$GITHUB_REF_NAME" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $package_version." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          asset="commit-wisp-${{ matrix.target }}"
          mkdir -p "$asset"
          cp "target/${{ matrix.target }}/release/commit-wisp" README.md LICENSE "$asset/"
          tar -czf "$asset.tar.gz" "$asset"
      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "commit-wisp-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $asset
          Copy-Item "target/${{ matrix.target }}/release/commit-wisp.exe", README.md, LICENSE -Destination $asset
          Compress-Archive -Path $asset -DestinationPath "$asset.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: commit-wisp-${{ matrix.target }}
          path: commit-wisp-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create checksums
        shell: bash
        run: |
          cp scripts/install.sh scripts/install.ps1 dist/
          cd dist
          sha256sum commit-wisp-*.* install.sh install.ps1 > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Homebrew publishing is not configured
        if: env.TAP_TOKEN == ''
        run: echo "Set HOMEBREW_TAP_TOKEN to publish siray-code/homebrew-tap automatically."
      - uses: actions/checkout@v4
        if: env.TAP_TOKEN != ''
        with:
          path: source
      - uses: actions/checkout@v4
        if: env.TAP_TOKEN != ''
        with:
          repository: siray-code/homebrew-tap
          token: ${{ env.TAP_TOKEN }}
          path: tap
      - name: Render formula
        if: env.TAP_TOKEN != ''
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            "https://github.com/siray-code/commit-wisp/releases/download/${GITHUB_REF_NAME}/SHA256SUMS" \
            --output SHA256SUMS
          source/scripts/render-homebrew-formula.sh "$GITHUB_REF_NAME" SHA256SUMS tap/Formula/commit-wisp.rb
      - name: Commit and push formula
        if: env.TAP_TOKEN != ''
        working-directory: tap
        shell: bash
        run: |
          git add Formula/commit-wisp.rb
          if git diff --cached --quiet; then
            echo "Formula is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update commit-wisp to ${GITHUB_REF_NAME}"
          git push
